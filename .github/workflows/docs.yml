name: docs

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Clears the Node.js 20 deprecation warning by opting into Node 24
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    # Required to allow mkdocs to push the build to your gh-pages branch
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip' # Automatically caches your pip dependencies

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Cython
          pip install -r requirements.txt -r requirements_dev.txt
          pip install .

      - name: Discover typos with codespell
        run: |
          codespell --skip="*.csv,*.geojson,*.json,*.js,*.html,*cff,./.git" --ignore-words-list="aci,hist"

      - name: PKG-TEST
        run: |
          python -m unittest discover tests/

      - name: Deploy Documentation
        run: mkdocs gh-deploy --force
